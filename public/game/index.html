<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>都市生存模拟器 - 文字挂机 MUD</title>
  <meta name="description" content="单机挂机文字 MUD，现代城市生存模拟">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;800&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles/idle-mud.css">
</head>
<body>
  <main class="page">
    <nav class="top-nav panel">
      <a class="home-link" href="/">← 项目主页</a>
      <span>移动端建议：竖屏体验</span>
    </nav>

    <header class="hero panel">
      <div>
        <h1>都市生存模拟器</h1>
        <p>城市生存挂机 · 现代现实向文字游戏</p>
      </div>
      <div class="seed-pill" id="seed-pill">Seed: -</div>
    </header>

    <section class="kpi-strip">
      <article class="kpi-card">
        <span>生命</span>
        <strong id="kpi-hp">-</strong>
      </article>
      <article class="kpi-card">
        <span>精神</span>
        <strong id="kpi-morale">-</strong>
      </article>
      <article class="kpi-card">
        <span>疲劳</span>
        <strong id="kpi-fatigue">-</strong>
      </article>
      <article class="kpi-card">
        <span>债务</span>
        <strong id="kpi-debt">-</strong>
      </article>
      <article class="kpi-card">
        <span>热度</span>
        <strong id="kpi-heat">-</strong>
      </article>
      <article class="kpi-card">
        <span>章节</span>
        <strong id="kpi-chapter">-</strong>
      </article>
    </section>

    <section class="panel killline-panel">
      <h2>生存仪表</h2>
      <div class="killline-grid">
        <div class="killline-row">
          <span>生命线</span>
          <div class="killline-track"><i id="kill-hp"></i></div>
          <em id="kill-hp-text">-</em>
        </div>
        <div class="killline-row">
          <span>精神线</span>
          <div class="killline-track"><i id="kill-morale"></i></div>
          <em id="kill-morale-text">-</em>
        </div>
        <div class="killline-row">
          <span>疲劳线</span>
          <div class="killline-track"><i id="kill-fatigue"></i></div>
          <em id="kill-fatigue-text">-</em>
        </div>
        <div class="killline-row">
          <span>债务线</span>
          <div class="killline-track"><i id="kill-debt"></i></div>
          <em id="kill-debt-text">-</em>
        </div>
        <div class="killline-row">
          <span>热度线</span>
          <div class="killline-track"><i id="kill-heat"></i></div>
          <em id="kill-heat-text">-</em>
        </div>
      </div>
      <div class="turn-card">
        <p id="turn-summary">回合反馈：待开始</p>
        <p id="turn-delta">变化：-</p>
        <p id="turn-risk">下回合风险：-</p>
      </div>
    </section>

    <section class="layout">
      <aside class="panel right-col">
        <h2>角色状态</h2>
        <pre id="character-sheet">尚未生成角色</pre>
        <section class="panel controls">
          <h2>操作台</h2>
          <div class="btn-row">
            <button id="reroll-btn">掷骰角色</button>
            <button id="start-btn" disabled>开始运行</button>
            <button id="pause-btn" disabled>暂停</button>
            <button id="resume-btn" disabled>恢复</button>
          </div>
          <div class="btn-row">
            <button id="share-card-btn" disabled>生成战报图</button>
            <button id="copy-share-btn" disabled>复制分享文案</button>
            <button id="copy-link-btn" disabled>复制挑战链接</button>
          </div>
          <div class="meta-row">
            <label for="speed-select">速度</label>
            <select id="speed-select" disabled>
              <option value="0.75">0.75x</option>
              <option value="1" selected>1.0x</option>
              <option value="1.5">1.5x</option>
              <option value="2">2.0x</option>
              <option value="3">3.0x</option>
            </select>
            <span class="hint">按 F 全屏，Esc 退出全屏</span>
          </div>
        </section>
        <section class="panel log-panel">
          <h2>生存日志</h2>
          <div id="log"></div>
        </section>
        <section class="panel trace-panel">
          <h2>事件轨迹</h2>
          <div id="event-trace"></div>
        </section>
        <section class="ending-panel">
          <h2>结局与分享</h2>
          <pre id="ending-sheet">本局尚未结束</pre>
          <canvas id="share-canvas" width="1080" height="1920" aria-label="share report"></canvas>
          <a id="download-share-link" class="hidden" download="survival-report.png">下载战报图</a>
        </section>
      </aside>
    </section>
  </main>

  <div id="choice-modal" class="choice-modal hidden" role="dialog" aria-modal="true" aria-live="polite">
    <div class="choice-card">
      <h3 id="choice-title"></h3>
      <p id="choice-body"></p>
      <div id="choice-options"></div>
    </div>
  </div>

  <script src="/src/idle-mud.js"></script>
</body>
</html>
