<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人生卡牌局 - 全新版本</title>
  <meta name="description" content="全新卡牌决策游戏：每回合打出关键选择，承受后果并走向不同人生结局。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/styles/card-v4.css" />
</head>
<body>
  <main class="app">
    <header class="hero panel">
      <div>
        <p class="eyebrow">CARD LIFE SIM</p>
        <h1>人生卡牌局</h1>
        <p class="lead">每一步都要出牌，每次选择都有代价。</p>
      </div>
      <div class="hero-actions">
        <button id="new-run-btn">新开一局</button>
        <a href="/" class="ghost-link">返回主页</a>
      </div>
    </header>

    <section id="stats" class="stats"></section>

    <section class="battlefield">
      <article class="main panel">
        <div class="top-tools">
          <label for="focus-select">策略倾向</label>
          <select id="focus-select">
            <option value="steady">稳住现金流</option>
            <option value="growth">赌成长</option>
            <option value="risk">高风险快进</option>
          </select>
          <button id="apply-focus-btn">应用</button>
        </div>

        <div class="card-host" id="card-host"></div>

        <div class="decision-row" id="decision-row">
          <button id="left-btn">选择 A</button>
          <button id="right-btn">选择 B</button>
        </div>

        <pre id="turn-note" class="turn-note">等待开始...</pre>
      </article>

      <aside class="side">
        <section class="panel">
          <h2>人生轨迹</h2>
          <pre id="timeline" class="timeline">暂无记录</pre>
        </section>

        <section class="panel">
          <h2>当前角色</h2>
          <pre id="profile" class="profile">尚未生成</pre>
        </section>

        <section class="panel">
          <h2>结局分享</h2>
          <pre id="ending" class="ending">本局尚未结束</pre>
          <div class="share-tools">
            <button id="copy-share-btn" disabled>复制结局文案</button>
          </div>
        </section>
      </aside>
    </section>

    <footer class="foot panel">
      <a href="/game-classic/">经典版</a>
      <a href="/game-legacy/">Legacy</a>
    </footer>
  </main>

  <script src="/src/card-runtime-v4.js"></script>
</body>
</html>
