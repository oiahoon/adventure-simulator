<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adventure Simulator - Idle Text MUD</title>
  <meta name="description" content="Single-player idle text MUD prototype">
  <link rel="stylesheet" href="/assets/styles/idle-mud.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>Adventure Simulator</h1>
      <p>单机挂机文字 MUD 验证版</p>
    </header>

    <section class="panel controls">
      <button id="reroll-btn">掷骰角色</button>
      <button id="start-btn" disabled>开始挂机</button>
      <button id="pause-btn" disabled>暂停</button>
      <button id="resume-btn" disabled>继续</button>
      <button id="share-card-btn" disabled>生成战报图</button>
      <button id="copy-share-btn" disabled>复制分享文案</button>
      <button id="copy-link-btn" disabled>复制挑战链接</button>
      <label for="speed-select">速度</label>
      <select id="speed-select" disabled>
        <option value="0.75">0.75x</option>
        <option value="1" selected>1.0x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2.0x</option>
        <option value="3">3.0x</option>
      </select>
      <span class="hint">按 F 全屏，Esc 退出全屏</span>
    </section>

    <section class="layout">
      <div class="left-col">
        <section class="panel">
          <h2>世界地图</h2>
          <canvas id="world-canvas" width="720" height="380" aria-label="world map"></canvas>
        </section>
        <section class="panel log-panel">
          <h2>冒险日志</h2>
          <div id="log"></div>
        </section>
      </div>

      <aside class="panel right-col">
        <h2>角色状态</h2>
        <pre id="character-sheet">尚未生成角色</pre>
        <section class="ending-panel">
          <h2>结局与分享</h2>
          <pre id="ending-sheet">本局尚未结束</pre>
          <canvas id="share-canvas" width="1080" height="1920" aria-label="share report"></canvas>
          <a id="download-share-link" class="hidden" download="jianghu-report.png">下载战报图</a>
        </section>
      </aside>
    </section>
  </main>

  <div id="choice-modal" class="choice-modal hidden" role="dialog" aria-modal="true" aria-live="polite">
    <div class="choice-card">
      <h3 id="choice-title"></h3>
      <p id="choice-body"></p>
      <div id="choice-options"></div>
    </div>
  </div>

  <script src="/src/idle-mud.js"></script>
</body>
</html>
