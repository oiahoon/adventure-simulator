<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>都市生活挑战</title>
    <link rel="icon" type="image/png" href="./assets/pixel/brand/favicon-mark.png" />
    <link rel="apple-touch-icon" href="./assets/pixel/brand/favicon-mark.png" />
    <style>
      :root {
        --bg: #f3efe3;
        --ink: #18221d;
        --muted: #66726c;
        --card: #faf8f1;
        --line: #cdc5b3;
        --primary: #cf6932;
        --primary-ink: #ffffff;
        --money: #437d54;
        --energy: #537fb7;
        --mood: #8661b4;
        --rep: #b5637f;
        --heat: #bf8a3d;
        --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
        --avatar-size: 124px;
        --tex-panel: url("./assets/pixel/cards/event-option-card.png");
        --tex-event: url("./assets/pixel/cards/event-option-card-v2.png");
        --tex-skill: url("./assets/pixel/cards/skill-card.png");
        --tex-supply: url("./assets/pixel/cards/supply-card.png");
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 14% -12%, #fbf2e2 0%, transparent 54%),
          radial-gradient(circle at 86% -8%, #eee6d6 0%, transparent 50%),
          repeating-linear-gradient(-12deg, rgba(123, 108, 76, 0.025) 0 1px, transparent 1px 6px),
          linear-gradient(180deg, #f7f4ec 0%, #f1ecdf 100%),
          var(--bg);
        font-family: "Source Han Sans SC", "PingFang SC", "Noto Sans SC", sans-serif;
      }
      #app {
        max-width: 640px;
        margin: 0 auto;
        padding: 8px 12px 24px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        padding-top: 2px;
      }
      .brand-wrap {
        display: grid;
        gap: 2px;
      }
      .brand-line {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }
      .logo-main {
        width: 44px;
        height: 44px;
        object-fit: contain;
        object-position: center;
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      .brand-title {
        margin: 0;
        font-size: 40px;
        letter-spacing: 0.8px;
        font-family: "Source Han Serif SC", "Songti SC", "Noto Serif SC", serif;
        font-weight: 700;
        line-height: 0.96;
        text-shadow:
          0 1px 0 rgba(255, 253, 248, 0.65),
          0 2px 0 rgba(35, 41, 34, 0.12);
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }
      h1 {
        margin: 0;
        font-size: 20px;
        letter-spacing: 0.1px;
        font-family: "Source Han Serif SC", "Songti SC", "Noto Serif SC", serif;
        font-weight: 700;
        line-height: 1.1;
      }
      #subtitle {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 11px;
        transition: color 220ms var(--ease-out), opacity 220ms var(--ease-out), transform 220ms var(--ease-out);
      }
      #subtitle.flash {
        color: #2f6f3c;
        animation: subtitleFlash 700ms var(--ease-out);
      }
      #main-panel {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }
      .card {
        --corner-tl: url("./assets/pixel/decor/corners/corner-gold-tl.png");
        --corner-tr: url("./assets/pixel/decor/corners/corner-gold-tr.png");
        --corner-bl: url("./assets/pixel/decor/corners/corner-gold-bl.png");
        --corner-br: url("./assets/pixel/decor/corners/corner-gold-br.png");
        border-radius: 16px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(247, 241, 228, 0.9)),
          var(--tex-panel) center/100% 100% no-repeat,
          var(--tex-event) center/100% 100% no-repeat;
        padding: 14px;
        box-shadow:
          0 2px 10px rgba(39, 45, 40, 0.04),
          inset 0 0 0 1px rgba(192, 180, 158, 0.45);
        position: relative;
        overflow: hidden;
      }
      .card::before,
      .card::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .card::before {
        background:
          var(--corner-tl) left 5px top 5px/14px 14px no-repeat,
          var(--corner-tr) right 5px top 5px/14px 14px no-repeat,
          var(--corner-bl) left 5px bottom 5px/14px 14px no-repeat,
          var(--corner-br) right 5px bottom 5px/14px 14px no-repeat;
        opacity: 0.9;
      }
      .card::after {
        background:
          linear-gradient(120deg, rgba(255, 255, 255, 0.22) 0%, transparent 30%),
          repeating-linear-gradient(
            0deg,
            rgba(171, 158, 132, 0.07) 0px,
            rgba(171, 158, 132, 0.07) 1px,
            transparent 1px,
            transparent 6px
          );
      }
      .status-card,
      .hero,
      .reason-block,
      .event-card {
        --corner-tl: url("./assets/pixel/decor/corners/corner-gold-tl.png");
        --corner-tr: url("./assets/pixel/decor/corners/corner-gold-tr.png");
        --corner-bl: url("./assets/pixel/decor/corners/corner-gold-bl.png");
        --corner-br: url("./assets/pixel/decor/corners/corner-gold-br.png");
      }
      .skill-module {
        --corner-tl: url("./assets/pixel/decor/corners/corner-blue-tl.png");
        --corner-tr: url("./assets/pixel/decor/corners/corner-blue-tr.png");
        --corner-bl: url("./assets/pixel/decor/corners/corner-blue-bl.png");
        --corner-br: url("./assets/pixel/decor/corners/corner-blue-br.png");
      }
      .supply-module {
        --corner-tl: url("./assets/pixel/decor/corners/corner-green-tl.png");
        --corner-tr: url("./assets/pixel/decor/corners/corner-green-tr.png");
        --corner-bl: url("./assets/pixel/decor/corners/corner-green-bl.png");
        --corner-br: url("./assets/pixel/decor/corners/corner-green-br.png");
      }
      .hero {
        padding: 20px 18px;
      }
      .hero h2 {
        margin: 10px 0;
        font-size: 22px;
        line-height: 1.35;
        font-family: "Source Han Serif SC", "Songti SC", "Noto Serif SC", serif;
        font-weight: 700;
      }
      .badge {
        display: inline-block;
        font-size: 12px;
        color: #7b5f36;
        background: #f3dfb7;
        border-radius: 999px;
        padding: 4px 10px;
      }
      .badge-event {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .badge-icon {
        width: 16px;
        height: 16px;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      .head-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .element-row {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .element-pill {
        font-size: 10px;
        line-height: 1;
        border: 1px solid #d7cebc;
        border-radius: 999px;
        padding: 3px 7px;
        background: #f5efe2;
        color: #5e6055;
      }
      .element-pill b {
        margin-right: 4px;
      }
      .head-row h2 {
        margin: 0;
        font-size: 22px;
      }
      .head-row p {
        margin: 0;
        font-weight: 600;
      }
      .hud-layout {
        margin-top: 8px;
        display: grid;
        grid-template-columns: var(--avatar-size) 1fr;
        gap: 10px;
        align-items: stretch;
      }
      .avatar-card {
        display: flex;
        align-items: center;
        justify-content: center;
        height: var(--avatar-size);
      }
      .avatar-stack {
        width: var(--avatar-size);
        height: var(--avatar-size);
        position: relative;
      }
      .avatar-img {
        width: var(--avatar-size);
        height: var(--avatar-size);
        border-radius: 10px;
        border: 2px solid var(--line);
        background: #f7f1e4;
        object-fit: cover;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      .avatar-badge {
        position: absolute;
        width: 28px;
        height: 28px;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        background: #fbf5e6;
        border: 1px solid #cfbe9e;
        border-radius: 6px;
        box-shadow: 0 2px 4px rgba(45, 39, 30, 0.2);
      }
      .avatar-badge.tl { left: -6px; top: -6px; }
      .avatar-badge.tr { right: -6px; top: -6px; }
      .avatar-badge.bl { left: -6px; bottom: -6px; }
      .avatar-badge.br { right: -6px; bottom: -6px; }
      .avatar-badge.top {
        left: calc(50% - 14px);
        top: -10px;
      }
      .hud-panel {
        justify-self: end;
        width: 100%;
        display: grid;
        gap: 6px;
        min-height: var(--avatar-size);
        align-content: space-between;
      }
      .hud-bar {
        border: 1px solid #d7cebc;
        border-radius: 9px;
        padding: 5px 7px;
        background: #f9f5eb;
        display: grid;
        grid-template-columns: 42px 1fr 40px;
        align-items: center;
        gap: 6px;
      }
      .hud-name,
      .hud-value {
        font-size: 11px;
        color: var(--ink);
        line-height: 1;
      }
      .hud-ele {
        margin-right: 3px;
        opacity: 0.8;
      }
      .hud-value {
        text-align: right;
      }
      .hud-track {
        height: 8px;
        border-radius: 999px;
        background: #e9e1d0;
        overflow: hidden;
      }
      .hud-fill {
        height: 100%;
        border-radius: inherit;
        transition: width 180ms ease;
      }
      .hud-bar.is-critical .hud-fill {
        animation: criticalPulse 1.2s ease-in-out infinite;
      }
      .hud-bar.is-strong {
        box-shadow: inset 0 0 0 1px rgba(130, 152, 102, 0.2);
      }
      .hud-bar.money .hud-fill { background: linear-gradient(90deg, #2f6f3c, #4db064); }
      .hud-bar.energy .hud-fill { background: linear-gradient(90deg, #2e63b6, #4d91ff); }
      .hud-bar.mood .hud-fill { background: linear-gradient(90deg, #7b33bf, #ad67ef); }
      .hud-bar.rep .hud-fill { background: linear-gradient(90deg, #b13e69, #e26595); }
      .hud-bar.heat .hud-fill { background: linear-gradient(90deg, #ba6c11, #f4a331); }
      .event-card h3,
      .tools-card h3,
      .card h3 {
        margin: 8px 0;
      }
      .mod-title {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .mod-icon {
        width: 18px;
        height: 18px;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      .event-card p {
        margin: 0 0 6px;
        line-height: 1.45;
      }
      .milestone-tip {
        display: none;
        margin: 0 0 8px;
        font-size: 11px;
        color: #7b5f36;
        background: rgba(243, 223, 183, 0.72);
        border-radius: 999px;
        padding: 4px 10px;
        width: fit-content;
      }
      .event-card.milestone-event {
        box-shadow:
          0 2px 10px rgba(39, 45, 40, 0.04),
          inset 0 0 0 1px rgba(192, 180, 158, 0.45),
          0 0 0 2px rgba(243, 223, 183, 0.32);
      }
      .event-card.milestone-event .badge-event {
        animation: milestonePulse 1.4s ease-in-out infinite;
      }
      .play-layout {
        display: grid;
        grid-template-columns: minmax(0, 1.75fr) minmax(232px, 1fr);
        gap: 10px;
        align-items: start;
      }
      .side-tools {
        display: grid;
        gap: 10px;
      }
      .compact-tools {
        padding: 10px;
      }
      .tools-headline {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }
      .tools-headline h3 {
        margin: 0;
      }
      .tools-headline .opt-impact {
        margin: 0;
        font-size: 11px;
      }
      .skill-module,
      .supply-module {
        background-image:
          url("./assets/pixel/decor/divider-runic.svg"),
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0)),
          var(--tex-event),
          var(--tex-panel);
        background-repeat: no-repeat, no-repeat, no-repeat, no-repeat;
        background-size: calc(100% - 28px) 8px, 100% 100%, 100% 100%, 100% 100%;
        background-position: center 44px, 0 0, center, center;
      }
      .event-card {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(250, 246, 236, 0.88)),
          var(--tex-panel) center/100% 100% no-repeat,
          var(--tex-event) center/100% 100% no-repeat;
        box-shadow:
          0 4px 14px rgba(47, 39, 27, 0.1),
          inset 0 0 0 1px rgba(167, 147, 113, 0.45),
          inset 0 0 0 3px rgba(249, 241, 224, 0.62);
      }
      .event-card h3 {
        font-size: 40px;
        line-height: 1.08;
        margin: 6px 0 10px;
        letter-spacing: 0.4px;
        text-shadow: 2px 2px 0 rgba(255, 247, 228, 0.75);
      }
      .skill-module {
        background-image:
          url("./assets/pixel/decor/divider-runic.svg"),
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0)),
          var(--tex-skill),
          var(--tex-panel);
        background-size: calc(100% - 28px) 8px, 100% 100%, 100% 100%, 100% 100%;
        background-position: center 44px, 0 0, center, center;
      }
      .supply-module {
        background-image:
          url("./assets/pixel/decor/divider-runic.svg"),
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0)),
          var(--tex-supply),
          var(--tex-panel);
        background-size: calc(100% - 28px) 8px, 100% 100%, 100% 100%, 100% 100%;
        background-position: center 44px, 0 0, center, center;
      }
      .option-list {
        display: grid;
        gap: 8px;
      }
      .option-btn {
        --btn-corner-tl: url("./assets/pixel/decor/corners/corner-gold-tl.png");
        --btn-corner-tr: url("./assets/pixel/decor/corners/corner-gold-tr.png");
        --btn-corner-bl: url("./assets/pixel/decor/corners/corner-gold-bl.png");
        --btn-corner-br: url("./assets/pixel/decor/corners/corner-gold-br.png");
        position: relative;
        border: 0;
        border-radius: 10px;
        padding: 10px 12px 10px 44px;
        text-align: left;
        background:
          linear-gradient(180deg, rgba(252, 251, 247, 0.86) 0%, rgba(247, 242, 230, 0.84) 100%),
          var(--tex-panel) center/100% 100% no-repeat,
          url("./assets/pixel/cards/event-option-card-v2.png") center/100% 100% no-repeat;
        box-shadow:
          0 4px 10px rgba(57, 49, 36, 0.12),
          inset 0 0 0 2px rgba(193, 178, 148, 0.66),
          inset 0 0 0 1px rgba(255, 247, 228, 0.45);
        cursor: pointer;
        display: grid;
        gap: 4px;
        overflow: hidden;
        transition:
          transform 140ms var(--ease-out),
          border-color 180ms ease,
          box-shadow 180ms ease;
        animation: optionSlide 260ms var(--ease-out) both;
        animation-delay: calc(var(--stagger, 0) * 45ms);
      }
      .option-btn::before,
      .option-btn::after {
        content: "";
        position: absolute;
        pointer-events: none;
      }
      .option-btn::before {
        inset: 0;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.4) 0px, rgba(255, 255, 255, 0) 18px) left center/72px 100% no-repeat,
          repeating-linear-gradient(
            0deg,
            rgba(202, 191, 167, 0.09) 0px,
            rgba(202, 191, 167, 0.09) 1px,
            transparent 1px,
            transparent 6px
          );
        opacity: 0.52;
      }
      .option-btn::after {
        background:
          var(--btn-corner-tl) left 4px top 4px/10px 10px no-repeat,
          var(--btn-corner-tr) right 4px top 4px/10px 10px no-repeat,
          var(--btn-corner-bl) left 4px bottom 4px/10px 10px no-repeat,
          var(--btn-corner-br) right 4px bottom 4px/10px 10px no-repeat;
        opacity: 0.9;
      }
      .opt-mark {
        position: absolute;
        left: 12px;
        top: 50%;
        width: 20px;
        height: 20px;
        border: 1px solid #cebfa3;
        border-radius: 4px;
        transform: translateY(-50%);
        background: #f8f0e0;
        display: grid;
        place-items: center;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.5);
      }
      .opt-mark img {
        width: 14px;
        height: 14px;
        object-fit: contain;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      .opt-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .opt-tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 10px;
        line-height: 1;
        padding: 4px 7px;
        border-radius: 999px;
        border: 1px solid #d3c8b5;
        color: #6b624f;
        background: #f9f2e6;
      }
      .opt-tag-icon {
        width: 10px;
        height: 10px;
        object-fit: contain;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        opacity: 0.8;
      }
      .tag-work .opt-tag { color: #315783; border-color: #b3c8df; background: #eaf2fc; }
      .tag-work .opt-mark { border-color: #b3c8df; background: #eaf2fc; }
      .tag-work.option-btn {
        --btn-corner-tl: url("./assets/pixel/decor/corners/corner-blue-tl.png");
        --btn-corner-tr: url("./assets/pixel/decor/corners/corner-blue-tr.png");
        --btn-corner-bl: url("./assets/pixel/decor/corners/corner-blue-bl.png");
        --btn-corner-br: url("./assets/pixel/decor/corners/corner-blue-br.png");
      }
      .tag-risk .opt-tag { color: #924747; border-color: #dfb8b8; background: #fceeee; }
      .tag-risk .opt-mark { border-color: #dfb8b8; background: #fceeee; }
      .tag-control .opt-tag { color: #556446; border-color: #bfd0ae; background: #edf7e5; }
      .tag-control .opt-mark { border-color: #bfd0ae; background: #edf7e5; }
      .tag-control.option-btn {
        --btn-corner-tl: url("./assets/pixel/decor/corners/corner-green-tl.png");
        --btn-corner-tr: url("./assets/pixel/decor/corners/corner-green-tr.png");
        --btn-corner-bl: url("./assets/pixel/decor/corners/corner-green-bl.png");
        --btn-corner-br: url("./assets/pixel/decor/corners/corner-green-br.png");
      }
      .tag-network .opt-tag { color: #5a4b7a; border-color: #ccbfe2; background: #f4edfb; }
      .tag-network .opt-mark { border-color: #ccbfe2; background: #f4edfb; }
      .tag-social .opt-tag { color: #7f4c60; border-color: #dfc1cc; background: #fbedf3; }
      .tag-social .opt-mark { border-color: #dfc1cc; background: #fbedf3; }
      .tag-content .opt-tag { color: #82572a; border-color: #e2c8aa; background: #fcf2e8; }
      .tag-content .opt-mark { border-color: #e2c8aa; background: #fcf2e8; }
      .tag-rest .opt-tag { color: #4e6a65; border-color: #bad3ce; background: #ebf8f5; }
      .tag-rest .opt-mark { border-color: #bad3ce; background: #ebf8f5; }
      .tag-money .opt-tag { color: #2f6b47; border-color: #b3d7c0; background: #e9f7ef; }
      .tag-money .opt-mark { border-color: #b3d7c0; background: #e9f7ef; }
      .tag-generic .opt-tag { color: #615842; border-color: #d0c7b6; background: #f6f1e6; }
      .tag-generic .opt-mark { border-color: #d0c7b6; background: #f6f1e6; }
      .option-btn:hover {
        box-shadow:
          0 8px 16px rgba(73, 61, 45, 0.18),
          inset 0 0 0 2px rgba(198, 182, 151, 0.78);
        transform: translateY(-2px);
      }
      .option-btn:active {
        transform: scale(0.985) translateY(1px);
      }
      .option-btn.tap-fx,
      .ghost.tap-fx {
        transform: scale(0.992);
        box-shadow: 0 2px 10px rgba(123, 93, 44, 0.16);
      }
      .opt-title {
        font-weight: 700;
        font-size: 15px;
      }
      .opt-impact {
        font-size: 11px;
        color: #76664c;
      }
      .chapter-chip {
        display: inline-block;
        width: fit-content;
        padding: 3px 10px;
        border-radius: 14px;
        border: 1px solid #d8cdae;
        background: #f6efdf;
        transform: skewX(-11deg);
      }
      .chapter-chip::before {
        content: "";
      }
      .chapter-chip {
        box-shadow: inset 0 0 0 1px rgba(255, 251, 238, 0.55);
      }
      .chapter-chip.tone-wood { color: #35574a; background: #eaf6ef; border-color: #b7d5c5; }
      .chapter-chip.tone-fire { color: #7a4b3d; background: #faeee8; border-color: #dfc2b5; }
      .chapter-chip.tone-earth { color: #705d3a; background: #f8f1e5; border-color: #dbc9a9; }
      .chapter-chip.tone-metal { color: #50535d; background: #eff1f7; border-color: #c4cbde; }
      .chapter-chip.tone-water { color: #3a5c78; background: #ebf2f8; border-color: #b9cfe0; }
      .chapter-chip.tone-dark { color: #4f4660; background: #f0edf8; border-color: #c9bfde; }
      .chapter-chip.tone-growth { color: #3f6a45; background: #ecf8ee; border-color: #b8d8bc; }
