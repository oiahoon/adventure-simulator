<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neon Deck</title>
    <link rel="icon" href="/favicon.ico" />
    <style>
      :root {
        --sand: #f4efe3;
        --ink: #17223b;
        --panel: #fffaf0;
        --line: #c5b493;
        --accent: #006d77;
      }
      html,
      body {
        margin: 0;
        background: radial-gradient(circle at 10% 10%, #fff7e7, var(--sand));
        color: var(--ink);
        font-family: "Trebuchet MS", "Avenir Next", sans-serif;
      }
      #app {
        max-width: 980px;
        margin: 0 auto;
        padding: 14px;
      }
      .hud {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 10px;
      }
      h1 {
        margin: 0;
        letter-spacing: 0.02em;
      }
      h2 {
        margin: 0 0 8px;
      }
      .subtle,
      #end-turn-btn {
        border: 2px solid var(--line);
        background: var(--panel);
        border-radius: 10px;
        padding: 8px 12px;
        cursor: pointer;
      }
      .arena {
        display: grid;
        gap: 10px;
      }
      .panel {
        border: 2px solid var(--line);
        background: var(--panel);
        border-radius: 12px;
        padding: 10px;
      }
      .hand-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .card-btn {
        border: 2px solid var(--line);
        border-radius: 10px;
        background: linear-gradient(180deg, #fffefb, #fff7ea);
        text-align: left;
        padding: 8px;
        cursor: pointer;
        min-height: 88px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .card-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .card-btn .name {
        font-weight: 700;
      }
      .card-btn .meta {
        color: var(--accent);
        font-size: 12px;
      }
      .card-btn .text {
        font-size: 13px;
      }
      .log p {
        margin: 0 0 4px;
        font-size: 13px;
      }
      @media (min-width: 900px) {
        .arena {
          grid-template-columns: 1fr 1fr;
        }
        #hand-panel,
        #log-panel {
          grid-column: span 2;
        }
        .hand-grid {
          grid-template-columns: repeat(5, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/app/main.js"></script>
  </body>
</html>
