<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>是男人就坚持100天</title>
    <link rel="icon" href="./favicon.ico" />
    <style>
      :root {
        --bg: #f8f6ef;
        --ink: #1d2638;
        --muted: #5f6573;
        --card: #fffdf8;
        --line: #d8cfba;
        --primary: #ef6a3a;
        --primary-ink: #ffffff;
        --money: #3d8b4d;
        --energy: #3a7ae0;
        --mood: #9b4de0;
        --rep: #d3527e;
        --heat: #e08a1f;
        --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% -5%, #ffe6cf 0%, transparent 45%),
          radial-gradient(circle at 85% -10%, #ffeecf 0%, transparent 45%),
          var(--bg);
        font-family: "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
      }
      #app {
        max-width: 640px;
        margin: 0 auto;
        padding: 12px 12px 28px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
      }
      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0.5px;
      }
      #subtitle {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
        transition: color 220ms var(--ease-out), opacity 220ms var(--ease-out), transform 220ms var(--ease-out);
      }
      #subtitle.flash {
        color: #2f6f3c;
        animation: subtitleFlash 700ms var(--ease-out);
      }
      #main-panel {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }
      .card {
        border: 2px solid var(--line);
        border-radius: 14px;
        background: var(--card);
        padding: 12px;
        animation: cardIn 220ms var(--ease-out);
      }
      .hero {
        padding: 16px;
      }
      .hero h2 {
        margin: 8px 0;
        font-size: 22px;
        line-height: 1.35;
      }
      .badge {
        display: inline-block;
        font-size: 12px;
        color: #8b5d26;
        background: #ffe6bf;
        border-radius: 999px;
        padding: 3px 10px;
      }
      .head-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .head-row h2 {
        margin: 0;
        font-size: 22px;
      }
      .head-row p {
        margin: 0;
        font-weight: 600;
      }
      .hud-layout {
        margin-top: 8px;
        display: grid;
        grid-template-columns: 86px 1fr;
        gap: 10px;
        align-items: center;
      }
      .avatar-card {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .avatar-img {
        width: 78px;
        height: 78px;
        border-radius: 10px;
        border: 2px solid var(--line);
        background: #f7f1e4;
      }
      .hud-panel {
        justify-self: end;
        width: 100%;
        display: grid;
        gap: 6px;
      }
      .hud-bar {
        border: 1px solid #cebfa2;
        border-radius: 9px;
        padding: 5px 7px;
        background: #fff8ec;
        display: grid;
        grid-template-columns: 42px 1fr 40px;
        align-items: center;
        gap: 6px;
      }
      .hud-name,
      .hud-value {
        font-size: 11px;
        color: var(--ink);
        line-height: 1;
      }
      .hud-value {
        text-align: right;
      }
      .hud-track {
        height: 8px;
        border-radius: 999px;
        background: #eadfca;
        overflow: hidden;
      }
      .hud-fill {
        height: 100%;
        border-radius: inherit;
        transition: width 180ms ease;
      }
      .hud-bar.money .hud-fill { background: linear-gradient(90deg, #2f6f3c, #4db064); }
      .hud-bar.energy .hud-fill { background: linear-gradient(90deg, #2e63b6, #4d91ff); }
      .hud-bar.mood .hud-fill { background: linear-gradient(90deg, #7b33bf, #ad67ef); }
      .hud-bar.rep .hud-fill { background: linear-gradient(90deg, #b13e69, #e26595); }
      .hud-bar.heat .hud-fill { background: linear-gradient(90deg, #ba6c11, #f4a331); }
      .event-card h3,
      .tools-card h3,
      .card h3 {
        margin: 8px 0;
      }
      .event-card p {
        margin: 0 0 6px;
        line-height: 1.45;
      }
      .option-list {
        display: grid;
        gap: 8px;
      }
      .option-btn {
        border: 2px solid #d7c5aa;
        border-radius: 12px;
        padding: 9px 10px;
        text-align: left;
        background: linear-gradient(180deg, #fffefb 0%, #fff6e8 100%);
        cursor: pointer;
        display: grid;
        gap: 4px;
        transition:
          transform 140ms var(--ease-out),
          border-color 180ms ease,
          box-shadow 180ms ease;
      }
      .option-btn:hover {
        border-color: #c5ad89;
        box-shadow: 0 4px 12px rgba(123, 93, 44, 0.12);
      }
      .option-btn:active {
        transform: scale(0.985) translateY(1px);
      }
      .opt-title {
        font-weight: 700;
        font-size: 15px;
      }
      .opt-impact {
        font-size: 11px;
        color: #7a5d34;
      }
      .action-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      button {
        border: 0;
        border-radius: 12px;
        padding: 11px 12px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 120ms var(--ease-out),
          filter 160ms ease,
          box-shadow 180ms ease;
      }
      .primary {
        background: var(--primary);
        color: var(--primary-ink);
        box-shadow: 0 6px 16px rgba(239, 106, 58, 0.2);
      }
      .ghost {
        border: 1px solid #cbbda4;
        background: #fff8ec;
        color: var(--ink);
      }
      button:hover:not(:disabled) {
        filter: brightness(1.02);
      }
      button:active:not(:disabled) {
        transform: scale(0.985) translateY(1px);
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .history {
        margin: 0;
        padding-left: 16px;
        color: var(--muted);
        display: grid;
        gap: 6px;
      }
      .history span {
        color: #8c6a3b;
      }
      .score {
        margin: 8px 0;
        font-weight: 700;
      }
      .reason-block {
        margin: 10px 0;
        border: 1px solid #dcccae;
        border-radius: 10px;
        background: #fff8eb;
        padding: 8px 10px;
      }
      .reason-block h3 {
        margin: 0 0 6px;
        font-size: 15px;
      }
      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes subtitleFlash {
        0% {
          opacity: 0.7;
          transform: translateY(1px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }
      @media (max-width: 540px) {
        .avatar-img {
          width: 64px;
          height: 64px;
        }
        .hud-panel {
          width: 100%;
        }
        .hud-layout {
          grid-template-columns: 72px 1fr;
          gap: 8px;
        }
        .head-row h2 {
          font-size: 20px;
        }
        .action-grid {
          grid-template-columns: 1fr;
        }
        h1 {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./app/main.js?v=20260227_6"></script>
  </body>
</html>
