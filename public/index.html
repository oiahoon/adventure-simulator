<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Card Game Restart</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        --bg: #f3efe6;
        --ink: #1f2a44;
        --card: #fffdf7;
        --line: #d8c8a8;
      }
      html,
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #fff9ec, var(--bg));
        color: var(--ink);
      }
      #app {
        max-width: 960px;
        margin: 0 auto;
        padding: 16px;
      }
      .layout header h1 {
        margin: 0;
      }
      .layout main {
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr;
      }
      .card {
        border: 2px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        background: var(--card);
        min-height: 100px;
      }
      .arena {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 180px;
      }
      @media (min-width: 768px) {
        .layout main {
          grid-template-columns: 2fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="../app/main.js"></script>
  </body>
</html>
