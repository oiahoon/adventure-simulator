<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>是男人就坚持100天</title>
    <link rel="icon" href="./favicon.ico" />
    <style>
      :root {
        --bg: #f4f1e8;
        --ink: #1f2b26;
        --muted: #66726c;
        --card: #fbfaf5;
        --line: #cdc5b3;
        --primary: #d27643;
        --primary-ink: #ffffff;
        --money: #437d54;
        --energy: #537fb7;
        --mood: #8661b4;
        --rep: #b5637f;
        --heat: #bf8a3d;
        --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
        --avatar-size: 124px;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 18% -6%, #f8efe0 0%, transparent 52%),
          radial-gradient(circle at 84% -8%, #efe8d8 0%, transparent 48%),
          linear-gradient(180deg, #f6f3ea 0%, #f1ece0 100%),
          var(--bg);
        font-family: "Source Han Sans SC", "PingFang SC", "Noto Sans SC", sans-serif;
      }
      #app {
        max-width: 640px;
        margin: 0 auto;
        padding: 12px 12px 28px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
      }
      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0.3px;
        font-family: "Source Han Serif SC", "Songti SC", "Noto Serif SC", serif;
        font-weight: 700;
      }
      #subtitle {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
        transition: color 220ms var(--ease-out), opacity 220ms var(--ease-out), transform 220ms var(--ease-out);
      }
      #subtitle.flash {
        color: #2f6f3c;
        animation: subtitleFlash 700ms var(--ease-out);
      }
      #main-panel {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--card);
        padding: 14px;
        box-shadow: 0 2px 10px rgba(39, 45, 40, 0.04);
      }
      .hero {
        padding: 20px 18px;
      }
      .hero h2 {
        margin: 10px 0;
        font-size: 22px;
        line-height: 1.35;
        font-family: "Source Han Serif SC", "Songti SC", "Noto Serif SC", serif;
        font-weight: 700;
      }
      .badge {
        display: inline-block;
        font-size: 12px;
        color: #7b5f36;
        background: #f3dfb7;
        border-radius: 999px;
        padding: 4px 10px;
      }
      .head-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .head-row h2 {
        margin: 0;
        font-size: 22px;
      }
      .head-row p {
        margin: 0;
        font-weight: 600;
      }
      .hud-layout {
        margin-top: 8px;
        display: grid;
        grid-template-columns: var(--avatar-size) 1fr;
        gap: 10px;
        align-items: stretch;
      }
      .avatar-card {
        display: flex;
        align-items: center;
        justify-content: center;
        height: var(--avatar-size);
      }
      .avatar-img {
        width: var(--avatar-size);
        height: var(--avatar-size);
        border-radius: 10px;
        border: 2px solid var(--line);
        background: #f7f1e4;
        object-fit: cover;
      }
      .hud-panel {
        justify-self: end;
        width: 100%;
        display: grid;
        gap: 6px;
        min-height: var(--avatar-size);
        align-content: space-between;
      }
      .hud-bar {
        border: 1px solid #d7cebc;
        border-radius: 9px;
        padding: 5px 7px;
        background: #f9f5eb;
        display: grid;
        grid-template-columns: 42px 1fr 40px;
        align-items: center;
        gap: 6px;
      }
      .hud-name,
      .hud-value {
        font-size: 11px;
        color: var(--ink);
        line-height: 1;
      }
      .hud-value {
        text-align: right;
      }
      .hud-track {
        height: 8px;
        border-radius: 999px;
        background: #e9e1d0;
        overflow: hidden;
      }
      .hud-fill {
        height: 100%;
        border-radius: inherit;
        transition: width 180ms ease;
      }
      .hud-bar.money .hud-fill { background: linear-gradient(90deg, #2f6f3c, #4db064); }
      .hud-bar.energy .hud-fill { background: linear-gradient(90deg, #2e63b6, #4d91ff); }
      .hud-bar.mood .hud-fill { background: linear-gradient(90deg, #7b33bf, #ad67ef); }
      .hud-bar.rep .hud-fill { background: linear-gradient(90deg, #b13e69, #e26595); }
      .hud-bar.heat .hud-fill { background: linear-gradient(90deg, #ba6c11, #f4a331); }
      .event-card h3,
      .tools-card h3,
      .card h3 {
        margin: 8px 0;
      }
      .event-card p {
        margin: 0 0 6px;
        line-height: 1.45;
      }
      .option-list {
        display: grid;
        gap: 8px;
      }
      .option-btn {
        border: 1px solid #d3c8b3;
        border-radius: 12px;
        padding: 10px 11px;
        text-align: left;
        background: linear-gradient(180deg, #fcfbf7 0%, #f7f2e6 100%);
        cursor: pointer;
        display: grid;
        gap: 4px;
        transition:
          transform 140ms var(--ease-out),
          border-color 180ms ease,
          box-shadow 180ms ease;
      }
      .option-btn:hover {
        border-color: #bfb29b;
        box-shadow: 0 6px 14px rgba(73, 61, 45, 0.08);
      }
      .option-btn:active {
        transform: scale(0.985) translateY(1px);
      }
      .option-btn.tap-fx,
      .ghost.tap-fx {
        transform: scale(0.992);
        box-shadow: 0 2px 10px rgba(123, 93, 44, 0.16);
      }
      .opt-title {
        font-weight: 700;
        font-size: 15px;
      }
      .opt-impact {
        font-size: 11px;
        color: #76664c;
      }
      .action-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .end-actions {
        grid-template-columns: 1fr 1fr 1fr;
      }
      button {
        border: 0;
        border-radius: 12px;
        padding: 11px 12px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 120ms var(--ease-out),
          filter 160ms ease,
          box-shadow 180ms ease;
      }
      .primary {
        background: var(--primary);
        color: var(--primary-ink);
        box-shadow: 0 8px 20px rgba(170, 100, 48, 0.2);
      }
      .ghost {
        border: 1px solid #cdc2ad;
        background: #f8f3e8;
        color: var(--ink);
      }
      button:hover:not(:disabled) {
        filter: brightness(1.02);
      }
      button:active:not(:disabled) {
        transform: scale(0.985) translateY(1px);
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .history {
        margin: 0;
        padding-left: 16px;
        color: var(--muted);
        display: grid;
        gap: 6px;
      }
      .history span {
        color: #8c6a3b;
      }
      .score {
        margin: 8px 0;
        font-weight: 700;
      }
      .reason-block {
        margin: 10px 0;
        border: 1px solid #d9ceb8;
        border-radius: 10px;
        background: #f9f4e9;
        padding: 10px 11px;
      }
      .reason-block h3 {
        margin: 0 0 6px;
        font-size: 15px;
        font-family: "Source Han Serif SC", "Songti SC", "Noto Serif SC", serif;
      }
      .story-text {
        white-space: pre-line;
        line-height: 1.6;
      }
      @keyframes subtitleFlash {
        0% {
          opacity: 0.7;
          transform: translateY(1px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }
      @media (max-width: 540px) {
        :root {
          --avatar-size: 108px;
        }
        .avatar-img {
          width: var(--avatar-size);
          height: var(--avatar-size);
        }
        .hud-panel {
          width: 100%;
        }
        .hud-layout {
          grid-template-columns: var(--avatar-size) 1fr;
          gap: 8px;
        }
        .head-row h2 {
          font-size: 20px;
        }
        .action-grid {
          grid-template-columns: 1fr;
        }
        h1 {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./app/main.js?v=20260228_14"></script>
  </body>
</html>
