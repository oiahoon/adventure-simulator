<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>城市生存7天</title>
    <link rel="icon" href="./favicon.ico" />
    <style>
      :root {
        --bg: #f8f6ef;
        --ink: #1d2638;
        --muted: #5f6573;
        --card: #fffdf8;
        --line: #d8cfba;
        --primary: #ef6a3a;
        --primary-ink: #ffffff;
        --money: #3d8b4d;
        --energy: #3a7ae0;
        --mood: #9b4de0;
        --rep: #d3527e;
        --heat: #e08a1f;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% -5%, #ffe6cf 0%, transparent 45%),
          radial-gradient(circle at 85% -10%, #ffeecf 0%, transparent 45%),
          var(--bg);
        font-family: "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
      }
      #app {
        max-width: 640px;
        margin: 0 auto;
        padding: 12px 12px 28px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
      }
      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0.5px;
      }
      #subtitle {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }
      #main-panel {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }
      .card {
        border: 2px solid var(--line);
        border-radius: 14px;
        background: var(--card);
        padding: 12px;
      }
      .hero {
        padding: 16px;
      }
      .hero h2 {
        margin: 8px 0;
        font-size: 22px;
        line-height: 1.35;
      }
      .badge {
        display: inline-block;
        font-size: 12px;
        color: #8b5d26;
        background: #ffe6bf;
        border-radius: 999px;
        padding: 3px 10px;
      }
      .head-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .head-row h2 {
        margin: 0;
      }
      .head-row p {
        margin: 0;
        font-weight: 600;
      }
      .stats-grid {
        margin-top: 10px;
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
      }
      .stat {
        border-radius: 10px;
        border: 1px solid var(--line);
        padding: 8px 6px;
        display: grid;
        gap: 3px;
        text-align: center;
        font-size: 12px;
      }
      .stat strong {
        font-size: 18px;
      }
      .stat.money strong { color: var(--money); }
      .stat.energy strong { color: var(--energy); }
      .stat.mood strong { color: var(--mood); }
      .stat.rep strong { color: var(--rep); }
      .stat.heat strong { color: var(--heat); }
      .event-card h3,
      .tools-card h3,
      .card h3 {
        margin: 8px 0;
      }
      .event-card p {
        margin: 0 0 8px;
        line-height: 1.45;
      }
      .option-list {
        display: grid;
        gap: 8px;
      }
      .option-btn {
        border: 2px solid #d7c5aa;
        border-radius: 12px;
        padding: 11px;
        text-align: left;
        background: linear-gradient(180deg, #fffefb 0%, #fff6e8 100%);
        cursor: pointer;
        display: grid;
        gap: 4px;
      }
      .option-btn:active {
        transform: scale(0.99);
      }
      .opt-title {
        font-weight: 700;
        font-size: 16px;
      }
      .opt-impact {
        font-size: 12px;
        color: #7a5d34;
      }
      .action-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      button {
        border: 0;
        border-radius: 12px;
        padding: 11px 12px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }
      .primary {
        background: var(--primary);
        color: var(--primary-ink);
      }
      .ghost {
        border: 1px solid #cbbda4;
        background: #fff8ec;
        color: var(--ink);
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .history {
        margin: 0;
        padding-left: 16px;
        color: var(--muted);
        display: grid;
        gap: 6px;
      }
      .history span {
        color: #8c6a3b;
      }
      .score {
        margin: 8px 0;
        font-weight: 700;
      }
      .code {
        margin: 10px 0 0;
        font-size: 12px;
      }
      code {
        word-break: break-all;
        background: #f5ebd8;
        border-radius: 6px;
        padding: 1px 5px;
      }
      .import-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }
      input {
        border: 1px solid #d4c4a9;
        border-radius: 10px;
        padding: 10px;
      }
      @media (max-width: 540px) {
        .stats-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
        .action-grid,
        .import-row {
          grid-template-columns: 1fr;
        }
        h1 {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./app/main.js"></script>
  </body>
</html>
