<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neon Deck</title>
    <link rel="icon" href="/favicon.ico" />
    <style>
      :root {
        --sand: #f4efe3;
        --ink: #17223b;
        --panel: #fffaf0;
        --line: #c5b493;
        --accent: #006d77;
      }
      html,
      body {
        margin: 0;
        background: radial-gradient(circle at 10% 10%, #fff7e7, var(--sand));
        color: var(--ink);
        font-family: "Trebuchet MS", "Avenir Next", sans-serif;
      }
      #app {
        max-width: 980px;
        margin: 0 auto;
        padding: 14px;
      }
      .hud {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 10px;
      }
      .head-actions {
        display: flex;
        gap: 6px;
      }
      h1,
      h2,
      h3 {
        margin: 0 0 8px;
      }
      ol {
        margin: 0;
        padding-left: 18px;
      }
      .subtle,
      #end-turn-btn,
      select {
        border: 2px solid var(--line);
        background: var(--panel);
        border-radius: 10px;
        padding: 8px 12px;
        cursor: pointer;
      }
      .arena {
        display: grid;
        gap: 10px;
      }
      .panel {
        border: 2px solid var(--line);
        background: var(--panel);
        border-radius: 12px;
        padding: 10px;
      }
      .node-row {
        display: flex;
        gap: 6px;
      }
      .node {
        width: 26px;
        height: 26px;
        border-radius: 999px;
        border: 1px solid var(--line);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
      }
      .node.current {
        background: #ffe9b7;
        font-weight: 700;
      }
      .node.done {
        background: #d7f6de;
      }
      .node.elite {
        border-color: #aa5e1e;
      }
      .status-row {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin: 6px 0;
      }
      .status {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        background: #fff4dd;
      }
      .status-empty {
        opacity: 0.7;
        font-size: 12px;
      }
      .hand-grid,
      .reward-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .card-btn {
        border: 2px solid var(--line);
        border-radius: 10px;
        background: linear-gradient(180deg, #fffefb, #fff7ea);
        text-align: left;
        padding: 8px;
        cursor: pointer;
        min-height: 88px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .card-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .card-btn .name {
        font-weight: 700;
      }
      .card-btn .meta {
        color: var(--accent);
        font-size: 12px;
      }
      .card-btn .text {
        font-size: 13px;
      }
      .log p {
        margin: 0 0 4px;
        font-size: 13px;
      }
      .tune-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      @media (max-width: 699px) {
        #app {
          padding: 10px;
        }
        .hud {
          flex-direction: column;
          align-items: stretch;
        }
        .head-actions {
          width: 100%;
          display: grid;
          grid-template-columns: 1fr 1fr;
        }
        .hand-grid,
        .reward-grid {
          grid-template-columns: repeat(1, minmax(0, 1fr));
        }
        .tune-row {
          flex-direction: column;
          align-items: stretch;
        }
      }
      @media (min-width: 900px) {
        .arena {
          grid-template-columns: 1fr 1fr;
        }
        #hand-panel,
        #log-panel,
        #reward-panel {
          grid-column: span 2;
        }
        .hand-grid,
        .reward-grid {
          grid-template-columns: repeat(5, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/app/main.js"></script>
  </body>
</html>
