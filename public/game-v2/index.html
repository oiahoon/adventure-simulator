<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>都市生存模拟器 - 兼容入口</title>
  <meta name="description" content="兼容入口，自动跳转到默认 /game 页面" />
</head>
<body>
  <p>正在跳转到默认入口...</p>
  <p><a href="/game/">未自动跳转请点击</a></p>
  <script>
    (function () {
      var q = window.location.search || "";
      window.location.replace("/game/" + q);
    })();
  </script>
</body>
</html>
